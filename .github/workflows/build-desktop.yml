name: Build Desktop App

on:
  push:
    tags:
      - "v*"

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run build:desktop

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dmg-files
          path: release/*.dmg

  create-release:
    needs: build-mac
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          name: dmg-files

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Monitor ${{ github.ref_name }}
          body: |
            ## Claude Monitor ${{ github.ref_name }}

            Terminal-themed dashboard for monitoring Claude Code sessions, packaged as a native macOS app.

            ### Installation

            **Homebrew (Recommended)**
            ```bash
            brew tap ayu5h-raj/tap
            brew install --cask claude-monitor
            ```

            **Manual Download**
            - **Apple Silicon:** `Claude-Monitor-${{ github.ref_name }}-arm64.dmg`
            - **Intel Mac:** `Claude-Monitor-${{ github.ref_name }}-x64.dmg`

            Open the DMG, drag to Applications, then right-click → Open (first launch only).
          files: "*.dmg"
          draft: false
          prerelease: false

  update-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew Tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          CASK_VERSION="${VERSION#v}"

          # Find the arm64 DMG asset URL from the release (avoids filename guessing)
          DMG_URL=$(gh release view "${VERSION}" --repo ayu5h-raj/claude-monitor --json assets --jq '.assets[] | select(.name | test("arm64\\.dmg$")) | .url')
          DMG_NAME=$(gh release view "${VERSION}" --repo ayu5h-raj/claude-monitor --json assets --jq '.assets[] | select(.name | test("arm64\\.dmg$")) | .name')

          if [ -z "$DMG_URL" ]; then
            echo "Could not find arm64 DMG asset in release ${VERSION}"
            exit 1
          fi

          echo "Downloading: $DMG_NAME"
          echo "URL: $DMG_URL"

          # Download with retry
          MAX_RETRIES=5
          RETRY_DELAY=10
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -f -sL "$DMG_URL" -o claude-monitor.dmg; then
              break
            fi
            if [ $i -eq $MAX_RETRIES ]; then
              echo "Failed to download release after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "Download failed, retrying in ${RETRY_DELAY}s... (attempt $i/$MAX_RETRIES)"
            sleep $RETRY_DELAY
            RETRY_DELAY=$((RETRY_DELAY * 2))
          done
          SHA256=$(shasum -a 256 claude-monitor.dmg | cut -d' ' -f1)

          echo "Version: $CASK_VERSION"
          echo "SHA256: $SHA256"
          echo "Asset: $DMG_NAME"

          # Clone homebrew-tap repo
          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/ayu5h-raj/homebrew-tap.git
          cd homebrew-tap

          # Generate the cask file — URL uses the actual asset name from the release
          printf '%s\n' 'cask "claude-monitor" do' > Casks/claude-monitor.rb
          printf '%s\n' "  version \"${CASK_VERSION}\"" >> Casks/claude-monitor.rb
          printf '%s\n' "  sha256 \"${SHA256}\"" >> Casks/claude-monitor.rb
          printf '%s\n' '' >> Casks/claude-monitor.rb
          printf '%s\n' "  url \"https://github.com/ayu5h-raj/claude-monitor/releases/download/${VERSION}/${DMG_NAME}\"" >> Casks/claude-monitor.rb
          printf '%s\n' '  name "Claude Monitor"' >> Casks/claude-monitor.rb
          printf '%s\n' '  desc "Terminal-themed dashboard for monitoring Claude Code sessions"' >> Casks/claude-monitor.rb
          printf '%s\n' '  homepage "https://github.com/ayu5h-raj/claude-monitor"' >> Casks/claude-monitor.rb
          printf '%s\n' '' >> Casks/claude-monitor.rb
          printf '%s\n' '  postflight do' >> Casks/claude-monitor.rb
          printf '%s\n' '    system_command "/usr/bin/xattr",' >> Casks/claude-monitor.rb
          printf '%s\n' '                   args: ["-cr", "#{appdir}/Claude Monitor.app"],' >> Casks/claude-monitor.rb
          printf '%s\n' '                   sudo: false' >> Casks/claude-monitor.rb
          printf '%s\n' '  end' >> Casks/claude-monitor.rb
          printf '%s\n' '' >> Casks/claude-monitor.rb
          printf '%s\n' '  app "Claude Monitor.app"' >> Casks/claude-monitor.rb
          printf '%s\n' '' >> Casks/claude-monitor.rb
          printf '%s\n' '  zap trash: [' >> Casks/claude-monitor.rb
          printf '%s\n' '    "~/Library/Saved Application State/com.claudemonitor.app.savedState",' >> Casks/claude-monitor.rb
          printf '%s\n' '  ]' >> Casks/claude-monitor.rb
          printf '%s\n' 'end' >> Casks/claude-monitor.rb

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/claude-monitor.rb
          git commit -m "Update Claude Monitor to ${VERSION}"
          git push
